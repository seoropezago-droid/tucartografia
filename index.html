<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Cartografía - Diagnóstico Conductual</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: #1a1c24;
            color: #d4c5a9;
            line-height: 1.6;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 60px 40px; }

        /* ─── HEADER ─── */
        header {
            text-align: center;
            margin-bottom: 80px;
            border-bottom: 2px solid #8a6c5a;
            padding-bottom: 40px;
        }

        header h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            color: #c87941;
            font-weight: 500;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 20px;
            color: #d4c5a9;
            font-style: italic;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #8a6c5a;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ─── SECCIÓN 1: MINI REPORTE ─── */
        .seccion-lead-magnet {
            background-color: #252731;
            padding: 60px;
            border-left: 4px solid #c87941;
            margin-bottom: 60px;
        }

        .seccion-lead-magnet h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            color: #c87941;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .seccion-lead-magnet .descripcion {
            font-size: 16px;
            color: #d4c5a9;
            line-height: 1.8;
            margin-bottom: 10px;
        }

        .seccion-lead-magnet .aviso {
            font-size: 13px;
            color: #8a6c5a;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 40px;
        }

        /* ─── BOTÓN LEAD MAGNET ─── */
        .btn-lead-magnet {
            display: inline-block;
            background-color: #c87941;
            color: #1a1c24;
            padding: 18px 50px;
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-lead-magnet:hover { background-color: #d99650; }

        /* ─── SECCIÓN 2: TRANSICIÓN ─── */
        .seccion-transicion {
            margin-bottom: 60px;
            padding: 50px 0;
            border-top: 1px solid #8a6c5a;
            border-bottom: 1px solid #8a6c5a;
        }

        .seccion-transicion h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            color: #c87941;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-align: center;
        }

        .transicion-columnas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            margin-top: 30px;
        }

        .transicion-col h3 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #8a6c5a;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .transicion-col ul {
            list-style: none;
            padding: 0;
        }

        .transicion-col ul li {
            font-size: 15px;
            color: #d4c5a9;
            padding: 6px 0;
            padding-left: 16px;
            position: relative;
            line-height: 1.5;
        }

        .transicion-col ul li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #c87941;
            font-size: 12px;
        }

        .transicion-col.col-no ul li::before {
            content: '×';
            color: #8a6c5a;
        }

        /* ─── SECCIÓN 3: VENTA ─── */
        .seccion-venta { margin-bottom: 60px; }

        .hero {
            background-color: #252731;
            padding: 60px;
            border-left: 4px solid #c87941;
            margin-bottom: 40px;
        }

        .hero h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            color: #c87941;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .hero .subheadline {
            font-size: 14px;
            color: #8a6c5a;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 25px;
        }

        .hero p {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .features {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .feature {
            padding: 30px;
            border: 1px solid #8a6c5a;
            background-color: #252731;
        }

        .feature-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #c87941;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .feature-text {
            font-size: 14px;
            color: #d4c5a9;
            line-height: 1.6;
        }

        .pricing {
            background-color: #252731;
            padding: 40px;
            text-align: center;
            border: 1px solid #8a6c5a;
            margin-bottom: 30px;
        }

        .pricing-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #8a6c5a;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .price {
            font-family: 'JetBrains Mono', monospace;
            font-size: 36px;
            color: #c87941;
            margin: 15px 0;
            font-weight: 500;
        }

        .price-desc {
            font-size: 14px;
            color: #8a6c5a;
            margin-bottom: 6px;
        }

        .price-urgencia {
            font-size: 12px;
            color: #8a6c5a;
            font-style: italic;
        }

        .cta {
            text-align: center;
            margin: 20px 0 60px;
        }

        .cta-button {
            display: inline-block;
            background-color: #c87941;
            color: #1a1c24;
            padding: 18px 50px;
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
